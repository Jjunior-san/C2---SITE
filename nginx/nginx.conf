upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name c2sistemas.com 187.77.250.71 localhost;

    # Uploads grandes para os vídeos do suporte
    client_max_body_size 500M;

    location = /favicon.ico { access_log off; log_not_found off; }

    # Servir vídeos e imagens enviadas diretamente pelo Nginx
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        
        # Permitir range requests (essencial para que o player de vídeo funcione corretamente, 
        # permitindo avançar e retroceder os vídeos mp4)
        add_header Accept-Ranges bytes;
    }

    # Proxy para o Django (Gunicorn)
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Como o Cloudflare Tunnel (Zero Trust) vai lidar com o HTTPS, ele enviará as 
        # requisições para cá via HTTP, mas o Django deve saber que a origem é segura.
        proxy_set_header X-Forwarded-Proto https;
    }
}
