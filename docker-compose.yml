version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: c2sistemas_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=c2sistemas_db
      - POSTGRES_USER=c2sistemas_user
      - POSTGRES_PASSWORD=c2sistemas_super_secret_pwd_change_me
    # Expõe o banco na porta 3321 para o host (conforme solicitado para outros acessos)
    ports:
      - "3321:5432"

  web:
    build: .
    container_name: c2sistemas_web
    restart: unless-stopped
    # Rodamos o collectstatic (para puxar os arquivos do Django Admin), as migrações e em seguida subimos o Gunicorn
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn c2_sistemas.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=minha-chave-secreta-gigante-mude-depois-na-vps
      - DATABASE_URL=postgres://c2sistemas_user:c2sistemas_super_secret_pwd_change_me@db:5432/c2sistemas_db
      - ALLOWED_HOSTS=c2sistemas.com,187.77.250.71,localhost,web
      - CSRF_TRUSTED_ORIGINS=https://c2sistemas.com
    depends_on:
      - db

  nginx:
    image: nginx:1.25-alpine
    container_name: c2sistemas_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Montar os mesmos volumes do Django para que o Nginx possa servir as imagens e vídeos diretamente
      - static_volume:/app/static
      - media_volume:/app/media
    # O Nginx responde na 3320 para receber o tráfego do Cloudflare Tunnel
    ports:
      - "3320:80"
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
